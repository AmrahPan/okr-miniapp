<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OKR — Объекты 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#FFFFFF;--s2:#F7F8FA;--s3:#F1F3F5;--border:#E5E7EB;--b2:#D1D5DB;
  --text:#111827;--t2:#4B5563;--t3:#9CA3AF;
  --accent:#6366F1;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:12px;line-height:1.5;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
input{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--s2);}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px;}
::-webkit-scrollbar-thumb:hover{background:var(--t3);}

.top{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg);position:sticky;top:0;z-index:10;}
.top-l{display:flex;align-items:center;gap:12px;}
.top-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;background:var(--s3);color:var(--text);}
.top-goal{font-size:14px;font-weight:600;}
.top-goal span{font-size:11px;color:var(--t3);font-weight:400;margin-left:8px;}
.top-r{display:flex;align-items:center;gap:12px;}
.saved{font-size:11px;color:var(--t3);}
.btn{font-size:12px;font-weight:500;padding:6px 12px;border-radius:7px;border:1px solid var(--border);color:var(--t2);transition:all .12s;}
.btn:hover{background:var(--s2);color:var(--text);}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-p:hover{background:#4F46E5;color:#fff;}

.scroll{overflow:auto;height:calc(100vh - 60px);}
table{border-collapse:separate;border-spacing:0;min-width:max-content;}
th,td{border-right:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:top;text-align:left;}

/* Frozen columns */
.c-obj{position:sticky;left:0;z-index:5;background:var(--s2);min-width:120px;max-width:120px;padding:9px 11px;}
.c-goal{position:sticky;left:120px;z-index:5;background:var(--s2);min-width:160px;max-width:160px;padding:9px 11px;}
.c-krq{position:sticky;left:280px;z-index:5;background:var(--s2);min-width:140px;max-width:140px;padding:9px 11px;}
.c-krn{position:sticky;left:420px;z-index:5;background:var(--s2);min-width:120px;max-width:120px;padding:9px 11px;border-right:2px solid var(--b2);}

/* Headers */
.hd{position:sticky;top:0;z-index:6;background:var(--s3);font-size:10px;font-weight:700;letter-spacing:.3px;color:var(--t3);padding:8px 10px;text-transform:uppercase;}
.hd-corner{z-index:8!important;}
.week-hd{position:sticky;top:0;z-index:6;background:var(--s3);font-size:10px;font-weight:600;color:var(--t2);padding:8px 8px;text-align:center;min-width:150px;max-width:150px;}

/* Month band */
.month-band td{position:sticky;left:0;background:var(--text);color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;padding:7px 11px;z-index:4;text-transform:uppercase;}

/* Object */
.obj{font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px;}
.obj-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cell-text{font-size:10px;color:var(--t2);line-height:1.45;}

/* Editable */
.cell{min-width:150px;max-width:150px;padding:7px 9px;font-size:10px;line-height:1.45;color:var(--t2);cursor:text;background:var(--bg);}
.cell:hover{background:var(--s2);}
.cell:focus{outline:2px solid var(--accent);outline-offset:-2px;background:#fff;color:var(--text);}
.cell.filled{color:var(--text);}
.editable{cursor:text;}
.editable:focus{outline:2px solid var(--accent);outline-offset:-2px;background:#fff;}

.legend{padding:8px 20px;border-top:1px solid var(--border);font-size:10px;color:var(--t3);background:var(--bg);}

/* Add object row button */
.add-obj-btn{padding:8px 11px;color:var(--accent);font-size:11px;font-weight:500;cursor:pointer;}
.add-obj-btn:hover{background:var(--s2);}
</style>
</head>
<body>

<div class="top">
  <div class="top-l">
    <span class="top-badge">O2 · Главная цель</span>
    <div class="top-goal">1 500 000 ₽ / мес личная прибыль <span>не сгораемо · к марту 2027</span></div>
  </div>
  <div class="top-r">
    <span class="saved" id="saved">Автосохранение</span>
    <button class="btn" onclick="addObject()">+ Объект</button>
    <button class="btn" onclick="exportData()">Экспорт</button>
  </div>
</div>

<div class="scroll">
  <table id="tbl"></table>
</div>

<script>
const K='okr_objects_2026';

let OBJECTS=[
  {id:'sur1',tag:'Surprise #1',color:'#6366F1'},
  {id:'sur2',tag:'Surprise #2',color:'#0EA5E9'},
  {id:'sur3',tag:'Surprise #3',color:'#8B5CF6'},
  {id:'ordery',tag:'Ordery',color:'#10B981'},
];

const MONTHS=[
  {key:'dec',label:'Декабрь 2026'},
  {key:'nov',label:'Ноябрь 2026'},
  {key:'oct',label:'Октябрь 2026'},
  {key:'sep',label:'Сентябрь 2026'},
  {key:'aug',label:'Август 2026'},
  {key:'jul',label:'Июль 2026'},
];
const WEEKS=['1','8','15','22'];

const DEFAULTS={
  sur1:{goal:'Открыть и стабилизировать первую точку',krq:'Точка работает, стабильная операционка',krn:'250 000 ₽ чистыми/мес'},
  sur2:{goal:'Открыть вторую точку',krq:'Вторая точка запущена',krn:'250 000 ₽ чистыми/мес'},
  sur3:{goal:'Открыть третью точку',krq:'Третья точка запущена',krn:'250 000 ₽ чистыми/мес'},
  ordery:{goal:'CTO + внедрения → масштаб продаж',krq:'Команда и продукт масштабируются',krn:'750 000 ₽ чистыми/мес'},
};

const SEED={
  'sur1|jul|15':'Открытие 15–20 июля',
  'sur1|jul|22':'Стабилизация операционки',
  'sur1|aug|1':'Выход на плановую выручку',
  'sur1|dec|1':'Работает · 250к',
  'ordery|jul|1':'Держу переговоры с ресторанами',
  'ordery|aug|1':'Активный найм CTO',
  'ordery|sep|1':'CTO на борту, первые 3–5 клиентов',
  'ordery|dec|1':'20 клиентов',
  'sur2|sep|1':'Поиск локации #2',
  'sur2|oct|1':'Подписание + проектирование',
  'sur2|nov|1':'Открытие',
  'sur3|nov|1':'Поиск локации #3',
  'sur3|dec|1':'Подписание',
};

function load(){
  try{
    const r=localStorage.getItem(K);
    if(r){const p=JSON.parse(r);if(p.objects)OBJECTS=p.objects;return p.data||{};}
  }catch{}
  return {...SEED};
}
function save(){
  localStorage.setItem(K,JSON.stringify({objects:OBJECTS,data:DATA}));
  const s=document.getElementById('saved');s.textContent='Сохранено ✓';setTimeout(()=>s.textContent='Автосохранение',1000);
}
let DATA=load();

function g(id,mk,f){return DATA[id+'|'+mk+'|'+f] ?? (DEFAULTS[id]?DEFAULTS[id][f]:'') ?? '';}

function build(){
  let h='<thead><tr>';
  h+='<th class="hd hd-corner c-obj">Объект</th>';
  h+='<th class="hd hd-corner c-goal">Цель</th>';
  h+='<th class="hd hd-corner c-krq">КР качественный</th>';
  h+='<th class="hd hd-corner c-krn">КР количественный</th>';
  WEEKS.forEach(w=>{h+=`<th class="week-hd">Weekly ${w}</th>`;});
  h+='</tr></thead><tbody>';

  MONTHS.forEach(m=>{
    h+=`<tr class="month-band"><td colspan="${4+WEEKS.length}">${m.label} · Sprint review</td></tr>`;
    OBJECTS.forEach(o=>{
      h+='<tr>';
      h+=`<td class="c-obj"><div class="obj"><span class="obj-dot" style="background:${o.color}"></span>${o.tag}</div></td>`;
      h+=`<td class="c-goal editable" contenteditable="true" data-key="${o.id}|${m.key}|goal" oninput="onEdit(this)" spellcheck="false"><span class="cell-text">${g(o.id,m.key,'goal')}</span></td>`;
      h+=`<td class="c-krq editable" contenteditable="true" data-key="${o.id}|${m.key}|krq" oninput="onEdit(this)" spellcheck="false"><span class="cell-text">${g(o.id,m.key,'krq')}</span></td>`;
      h+=`<td class="c-krn editable" contenteditable="true" data-key="${o.id}|${m.key}|krn" oninput="onEdit(this)" spellcheck="false"><span class="cell-text">${g(o.id,m.key,'krn')}</span></td>`;
      WEEKS.forEach(w=>{
        const key=`${o.id}|${m.key}|${w}`;
        const val=DATA[key]||'';
        h+=`<td class="cell ${val?'filled':''}" contenteditable="true" data-key="${key}" oninput="onEdit(this)" spellcheck="false">${val}</td>`;
      });
      h+='</tr>';
    });
  });
  h+='</tbody>';
  document.getElementById('tbl').innerHTML=h;
}

function onEdit(el){
  const key=el.getAttribute('data-key');
  const val=el.textContent.trim();
  if(val)DATA[key]=val; else delete DATA[key];
  if(el.classList.contains('cell'))el.classList.toggle('filled',!!val);
  save();
}

function addObject(){
  const tag=prompt('Название объекта:');
  if(!tag)return;
  const colors=['#EC4899','#F59E0B','#14B8A6','#EF4444','#8B5CF6','#3B82F6'];
  const color=colors[OBJECTS.length%colors.length];
  OBJECTS.push({id:'obj'+Date.now(),tag,color});
  save();build();
}

function exportData(){
  let csv='Объект,Цель,КР качественный,КР количественный';
  WEEKS.forEach(w=>csv+=`,Weekly ${w}`);
  csv+='\n';
  MONTHS.forEach(m=>{
    csv+=`${m.label}\n`;
    OBJECTS.forEach(o=>{
      const cells=[o.tag,g(o.id,m.key,'goal'),g(o.id,m.key,'krq'),g(o.id,m.key,'krn')];
      WEEKS.forEach(w=>cells.push(DATA[`${o.id}|${m.key}|${w}`]||''));
      csv+=cells.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')+'\n';
    });
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='okr_2026.csv';
  a.click();
}

build();
</script>
</body>
</html>
