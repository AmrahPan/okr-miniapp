<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OKR — Объекты 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#FFFFFF;--s2:#F7F8FA;--s3:#F1F3F5;--border:#E5E7EB;--b2:#D1D5DB;
  --text:#111827;--t2:#4B5563;--t3:#9CA3AF;--accent:#6366F1;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:12px;line-height:1.5;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--s2);}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px;}
::-webkit-scrollbar-thumb:hover{background:var(--t3);}

.top{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg);}
.top-l{display:flex;align-items:center;gap:12px;}
.top-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;background:var(--s3);color:var(--text);}
.top-goal{font-size:14px;font-weight:600;}
.top-goal span{font-size:11px;color:var(--t3);font-weight:400;margin-left:8px;}
.top-r{display:flex;align-items:center;gap:12px;}
.saved{font-size:11px;color:var(--t3);}
.btn{font-size:12px;font-weight:500;padding:6px 12px;border-radius:7px;border:1px solid var(--border);color:var(--t2);transition:all .12s;}
.btn:hover{background:var(--s2);color:var(--text);}

.scroll{overflow:auto;height:calc(100vh - 60px);}
table{border-collapse:separate;border-spacing:0;min-width:max-content;}
th,td{border-right:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:top;text-align:left;}

/* Frozen left columns */
.c-obj{position:sticky;left:0;z-index:5;background:var(--s2);min-width:130px;max-width:130px;padding:10px 11px;}
.c-goal{position:sticky;left:130px;z-index:5;background:var(--s2);min-width:170px;max-width:170px;padding:10px 11px;}
.c-kr{position:sticky;left:300px;z-index:5;background:var(--s2);min-width:150px;max-width:150px;padding:10px 11px;border-right:2px solid var(--b2);}

/* Month header (row 1) */
.month-hd{position:sticky;top:0;z-index:6;background:var(--text);color:#fff;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:8px 10px;text-align:center;border-right:2px solid var(--bg);}
/* Week header (row 2) */
.week-hd{position:sticky;top:33px;z-index:6;background:var(--s3);font-size:10px;font-weight:600;color:var(--t2);padding:6px 6px;text-align:center;min-width:120px;max-width:120px;}
.week-hd.mstart{border-left:2px solid var(--b2);}

/* Corner frozen headers */
.corner{position:sticky;left:0;z-index:8;background:var(--s3);}
.corner1{position:sticky;left:130px;z-index:8;background:var(--s3);}
.corner2{position:sticky;left:300px;z-index:8;background:var(--s3);border-right:2px solid var(--b2);}
.hd-lbl{font-size:10px;font-weight:700;letter-spacing:.3px;color:var(--t3);text-transform:uppercase;padding:8px 11px;}

/* Object */
.obj{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.obj-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cell-text{font-size:10px;color:var(--t2);line-height:1.45;}

/* Editable */
.cell{min-width:120px;max-width:120px;padding:7px 9px;font-size:10px;line-height:1.45;color:var(--t2);cursor:text;background:var(--bg);}
.cell.mstart{border-left:2px solid var(--b2);}
.cell:hover{background:var(--s2);}
.cell:focus{outline:2px solid var(--accent);outline-offset:-2px;background:#fff;color:var(--text);}
.cell.filled{color:var(--text);}
.editable{cursor:text;}
.editable:focus{outline:2px solid var(--accent);outline-offset:-2px;background:#fff;}

/* KR progressive row inside object */
.kr-month-row td{background:var(--s2);}
.kr-month-cell{min-width:120px;max-width:120px;padding:5px 9px;font-size:10px;font-weight:600;color:var(--accent);line-height:1.4;background:#F5F6FF;}
.kr-month-cell.mstart{border-left:2px solid var(--b2);}
.kr-label{position:sticky;left:0;z-index:5;background:#F5F6FF;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);padding:5px 11px;}
.kr-label-span{position:sticky;left:0;z-index:5;background:#F5F6FF;}
</style>
</head>
<body>

<div class="top">
  <div class="top-l">
    <span class="top-badge">O2 · Главная цель</span>
    <div class="top-goal">1 500 000 ₽ / мес личная прибыль <span>не сгораемо · к марту 2027</span></div>
  </div>
  <div class="top-r">
    <span class="saved" id="saved">Автосохранение</span>
    <button class="btn" onclick="addObject()">+ Объект</button>
    <button class="btn" onclick="exportData()">Экспорт CSV</button>
  </div>
</div>

<div class="scroll">
  <table id="tbl"></table>
</div>

<script>
const K='okr_horizontal_2026';

let OBJECTS=[
  {id:'sur1',tag:'Surprise #1',color:'#6366F1',goal:'Открыть и стабилизировать первую точку',kr:'250 000 ₽ чистыми/мес'},
  {id:'ordery',tag:'Ordery',color:'#10B981',goal:'CTO + внедрения → масштаб продаж',kr:'750 000 ₽ чистыми/мес'},
  {id:'sur2',tag:'Surprise #2',color:'#0EA5E9',goal:'Открыть вторую точку',kr:'250 000 ₽ чистыми/мес'},
  {id:'sur3',tag:'Surprise #3',color:'#8B5CF6',goal:'Открыть третью точку',kr:'250 000 ₽ чистыми/мес'},
];

// Horizontal: months Jul → Dec, each with 4 weeks
const MONTHS=[
  {key:'jul',label:'Июль 2026'},
  {key:'aug',label:'Август 2026'},
  {key:'sep',label:'Сентябрь 2026'},
  {key:'oct',label:'Октябрь 2026'},
  {key:'nov',label:'Ноябрь 2026'},
  {key:'dec',label:'Декабрь 2026'},
];
const WEEKS=['1','8','15','22'];

// Progressive monthly KR (shown as a highlighted row under each object)
const MONTH_KR={
  sur1:{jul:'Открытие · выход в плюс',aug:'100 000 ₽',sep:'150 000 ₽',oct:'200 000 ₽',nov:'250 000 ₽',dec:'250 000 ₽'},
  ordery:{jul:'Воронка тёплых',aug:'CTO нанят',sep:'3–5 клиентов',oct:'8–10 клиентов',nov:'15 клиентов',dec:'20 клиентов'},
  sur2:{jul:'—',aug:'—',sep:'Локация',oct:'Договор + проект',nov:'Открытие',dec:'100 000 ₽'},
  sur3:{jul:'—',aug:'—',sep:'—',oct:'—',nov:'Локация',dec:'Договор'},
};

const SEED={
  'sur1|jul|15':'Открытие 15–20 июля',
  'sur1|jul|22':'Стабилизация операционки',
  'ordery|jul|1':'Держу переговоры с ресторанами',
  'ordery|aug|1':'Активный найм CTO',
  'sur2|sep|1':'Поиск локации #2',
  'sur3|nov|1':'Поиск локации #3',
};

function load(){
  try{const r=localStorage.getItem(K);if(r){const p=JSON.parse(r);if(p.objects)OBJECTS=p.objects;return p.data||{};}}catch{}
  return {...SEED};
}
function save(){
  localStorage.setItem(K,JSON.stringify({objects:OBJECTS,data:DATA}));
  const s=document.getElementById('saved');s.textContent='Сохранено ✓';setTimeout(()=>s.textContent='Автосохранение',1000);
}
let DATA=load();

function mkr(id,mk){
  if(DATA[id+'|'+mk+'|_mkr']!==undefined)return DATA[id+'|'+mk+'|_mkr'];
  return (MONTH_KR[id]&&MONTH_KR[id][mk])?MONTH_KR[id][mk]:'';
}

function build(){
  let h='<thead>';
  // Row 1: months
  h+='<tr>';
  h+='<th class="corner month-hd" style="background:var(--s3);color:var(--t3)"><div class="hd-lbl">Объект</div></th>';
  h+='<th class="corner1 month-hd" style="background:var(--s3);color:var(--t3);top:0"><div class="hd-lbl">Цель</div></th>';
  h+='<th class="corner2 month-hd" style="background:var(--s3);color:var(--t3);top:0"><div class="hd-lbl">Ключевой результат</div></th>';
  MONTHS.forEach(m=>{
    h+=`<th class="month-hd" colspan="${WEEKS.length}">${m.label}</th>`;
  });
  h+='</tr>';
  // Row 2: weeks
  h+='<tr>';
  h+='<th class="corner week-hd" style="top:33px;background:var(--s3)"></th>';
  h+='<th class="corner1 week-hd" style="top:33px;left:130px;background:var(--s3)"></th>';
  h+='<th class="corner2 week-hd" style="top:33px;left:300px;background:var(--s3)"></th>';
  MONTHS.forEach(m=>{
    WEEKS.forEach((w,wi)=>{
      h+=`<th class="week-hd ${wi===0?'mstart':''}">нед ${w}</th>`;
    });
  });
  h+='</tr>';
  h+='</thead><tbody>';

  OBJECTS.forEach(o=>{
    // Main object row (weekly cells)
    h+='<tr>';
    h+=`<td class="c-obj"><div class="obj"><span class="obj-dot" style="background:${o.color}"></span>${o.tag}</div></td>`;
    h+=`<td class="c-goal editable" contenteditable="true" data-key="${o.id}|goal" oninput="onEdit(this)" spellcheck="false"><span class="cell-text">${DATA[o.id+'|goal']??o.goal}</span></td>`;
    h+=`<td class="c-kr editable" contenteditable="true" data-key="${o.id}|kr" oninput="onEdit(this)" spellcheck="false"><span class="cell-text">${DATA[o.id+'|kr']??o.kr}</span></td>`;
    MONTHS.forEach(m=>{
      WEEKS.forEach((w,wi)=>{
        const key=`${o.id}|${m.key}|${w}`;
        const val=DATA[key]||'';
        h+=`<td class="cell ${val?'filled':''} ${wi===0?'mstart':''}" contenteditable="true" data-key="${key}" oninput="onEdit(this)" spellcheck="false">${val}</td>`;
      });
    });
    h+='</tr>';
    // KR-per-month row (highlighted)
    h+='<tr class="kr-month-row">';
    h+=`<td class="kr-label" style="border-right:none">Цель месяца →</td>`;
    h+=`<td class="kr-label-span" style="left:130px"></td>`;
    h+=`<td class="kr-label-span" style="left:300px;border-right:2px solid var(--b2)"></td>`;
    MONTHS.forEach(m=>{
      const val=mkr(o.id,m.key);
      // span all 4 weeks of the month
      h+=`<td class="kr-month-cell mstart" colspan="${WEEKS.length}" contenteditable="true" data-key="${o.id}|${m.key}|_mkr" oninput="onEdit(this)" spellcheck="false">${val}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody>';
  document.getElementById('tbl').innerHTML=h;
}

function onEdit(el){
  const key=el.getAttribute('data-key');
  const val=el.textContent.trim();
  if(val)DATA[key]=val; else delete DATA[key];
  if(el.classList.contains('cell'))el.classList.toggle('filled',!!val);
  save();
}

function addObject(){
  const tag=prompt('Название объекта:');
  if(!tag)return;
  const colors=['#EC4899','#F59E0B','#14B8A6','#EF4444','#3B82F6','#8B5CF6'];
  OBJECTS.push({id:'obj'+Date.now(),tag,color:colors[OBJECTS.length%colors.length],goal:'',kr:''});
  save();build();
}

function exportData(){
  let csv='Объект,Цель,КР';
  MONTHS.forEach(m=>WEEKS.forEach(w=>csv+=`,${m.label} нед${w}`));
  csv+='\n';
  OBJECTS.forEach(o=>{
    const cells=[o.tag,DATA[o.id+'|goal']??o.goal,DATA[o.id+'|kr']??o.kr];
    MONTHS.forEach(m=>WEEKS.forEach(w=>cells.push(DATA[`${o.id}|${m.key}|${w}`]||'')));
    csv+=cells.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='okr_2026.csv';a.click();
}

build();
</script>
</body>
</html>
